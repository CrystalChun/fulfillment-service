apiVersion: v1
kind: ConfigMap
metadata:
  name: fulfillment-database-keycloak-init
data:
  # This script runs during PostgreSQL startup (Red Hat SCL PostgreSQL)
  init-keycloak.sql: |
    #!/bin/bash
    # Run SQL commands to create keycloak user and database
    psql <<EOF
    -- Create keycloak user (if not exists)
    DO \$\$
    BEGIN
      IF NOT EXISTS (SELECT FROM pg_catalog.pg_roles WHERE rolname = 'keycloak') THEN
        CREATE USER keycloak;
        RAISE NOTICE 'Created user keycloak';
      END IF;
    END
    \$\$;

    -- Create keycloak database (if not exists)
    SELECT 'CREATE DATABASE keycloak OWNER keycloak'
    WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname = 'keycloak')\gexec
    EOF
