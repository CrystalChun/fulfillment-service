syntax = "proto3";

package osac.public.v1;

// BreakGlassCredentials contains the temporary credentials for a break-glass admin account.
// These are only returned on organization creation and must be stored securely by the caller.
//
// A break-glass account is an emergency administrative account with limited IdP management
// permissions. It can manage users and identity providers but cannot modify critical
// organization settings.
message BreakGlassCredentials {
  // User ID in the identity provider
  string user_id = 1;

  // Username for authentication
  string username = 2;

  // Email address
  string email = 3;

  // Temporary password that must be changed on first login.
  // SECURITY: This field contains sensitive data and should be handled carefully:
  // - Only transmitted over TLS
  // - Store in a secure secrets manager (Vault, Kubernetes Secrets, AWS Secrets Manager)
  // - Never log this value
  // - Clear from memory after use
  string temporary_password = 4;
}
