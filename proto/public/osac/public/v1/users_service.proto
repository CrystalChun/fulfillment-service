syntax = "proto3";

package osac.public.v1;

import "google/api/annotations.proto";
import "google/protobuf/field_mask.proto";
import "osac/public/v1/user_type.proto";

message UsersListRequest {
  // Index of the first result. If not specified the default value will be zero.
  optional int32 offset = 1;

  // Maximum number of results to be returned by the server.
  optional int32 limit = 2;

  // Filter criteria (CEL expression).
  optional string filter = 3;

  // Order criteria.
  optional string order = 4;

  // Organization ID to list users from.
  string organization_id = 5;
}

message UsersListResponse {
  // Actual number of items returned.
  int32 size = 1;

  // Total number of items matching the search criteria.
  int32 total = 2;

  // List of users.
  repeated User items = 3;
}

message UsersGetRequest {
  string id = 1;

  // Organization ID that the user belongs to.
  string organization_id = 2;
}

message UsersGetResponse {
  User object = 1;
}

message UsersCreateRequest {
  User object = 1;
}

message UsersCreateResponse {
  User object = 1;
}

message UsersUpdateRequest {
  User object = 1;
  google.protobuf.FieldMask update_mask = 2;

  // Lock enables optimistic locking.
  bool lock = 3;
}

message UsersUpdateResponse {
  User object = 1;
}

message UsersDeleteRequest {
  string id = 1;

  // Organization ID that the user belongs to.
  string organization_id = 2;
}

message UsersDeleteResponse {}

service Users {
  // Retrieves the list of users in an organization.
  rpc List(UsersListRequest) returns (UsersListResponse) {
    option (google.api.http) = {get: "/api/fulfillment/v1/organizations/{organization_id}/users"};
  }

  // Retrieves the details of one specific user.
  rpc Get(UsersGetRequest) returns (UsersGetResponse) {
    option (google.api.http) = {
      get: "/api/fulfillment/v1/organizations/{organization_id}/users/{id}"
      response_body: "object"
    };
  }

  // Creates a new user in an organization.
  rpc Create(UsersCreateRequest) returns (UsersCreateResponse) {
    option (google.api.http) = {
      post: "/api/fulfillment/v1/organizations/{object.spec.organization_id}/users"
      body: "object"
      response_body: "object"
    };
  }

  // Updates an existing user.
  rpc Update(UsersUpdateRequest) returns (UsersUpdateResponse) {
    option (google.api.http) = {
      patch: "/api/fulfillment/v1/organizations/{object.spec.organization_id}/users/{object.id}"
      body: "object"
      response_body: "object"
    };
  }

  // Deletes a user.
  rpc Delete(UsersDeleteRequest) returns (UsersDeleteResponse) {
    option (google.api.http) = {delete: "/api/fulfillment/v1/organizations/{organization_id}/users/{id}"};
  }
}
