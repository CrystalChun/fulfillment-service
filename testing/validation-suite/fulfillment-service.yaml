# Additional metadata for reporting
metadata:
  name: "Fulfillment Service Control Plane Validation"
  version: "1.0"
  description: "Validates fulfillment-service Organizations, Users, and Access Keys APIs"
  author: "OSAC Project"
  tags:
    - control-plane
    - idp
    - organizations
    - users
    - access-keys
    - fulfillment-service

# Settings that can be overridden
tests:
  platform: control_plane
  cluster_name: "fulfillment-service-validation"
  description: "Control plane: API health, access key lifecycle, user management"

  settings:
    base_url: "http://localhost:8001"
    organization_id: ""  # Must be set via environment or command line
